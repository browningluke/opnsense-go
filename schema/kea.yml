---
name: kea
reconfigureEndpoint: "/kea/service/reconfigure"
resources:
  - name: SubnetV4
    filename: subnetv4
    monad: subnet4
    endpoints:
      add: "/kea/dhcpv4/add_subnet"
      get: "/kea/dhcpv4/get_subnet"
      update: "/kea/dhcpv4/set_subnet"
      delete: "/kea/dhcpv4/del_subnet"
    attrs:
      - name: Subnet
        type: string
        key: subnet
      - name: NextServer
        type: string
        key: next_server
      - name: Pools
        type: string
        key: pools
      - name: MatchClientId
        type: string
        key: match-client-id
      - name: OptionDataAutoCollect
        type: string
        key: option_data_autocollect
      - name: OptionData
        type: OptionDataV4
        key: option_data
      - name: Description
        type: string
        key: description
    customTypes: 
      OptionDataV4:
        - name: DomainNameServers
          type: SelectedMapList
          key: domain_name_servers
        - name: DomainSearch
          type: SelectedMapList
          key: domain_search
        - name: Routers
          type: SelectedMapList
          key: routers
        - name: StaticRoutes
          type: string
          key: static_routes
        - name: DomainName
          type: string
          key: domain_name
        - name: NtpServers
          type: SelectedMapList
          key: ntp_servers
        - name: TimeServers
          type: SelectedMapList
          key: time_servers
        - name: TftpServerName
          type: string
          key: tftp_server_name
        - name: BootFileName
          type: string
          key: boot_file_name
  - name: ReservationV4
    filename: reservationv4
    monad: reservation
    endpoints:
      add: "/kea/dhcpv4/add_reservation"
      get: "/kea/dhcpv4/get_reservation"
      update: "/kea/dhcpv4/set_reservation"
      delete: "/kea/dhcpv4/del_reservation"
    attrs:
      - name: Subnet
        type: SelectedMap
        key: subnet
      - name: IpAddress
        type: string
        key: ip_address
      - name: HwAddress
        type: string
        key: hw_address
      - name: Hostname
        type: string
        key: hostname
      - name: Description
        type: string
        key: description
  - name: PeerV4
    filename: peerv4
    monad: peer
    endpoints:
      add: "/kea/dhcpv4/add_peer"
      get: "/kea/dhcpv4/get_peer"
      update: "/kea/dhcpv4/set_peer"
      delete: "/kea/dhcpv4/del_peer"
    attrs:
      - name: Name
        type: string
        key: name
      - name: Url
        type: string
        key: url
      - name: Role
        type: SelectedMap
        key: role

  - name: SubnetV6
    filename: subnetv6
    monad: subnet6
    endpoints:
      add: "/kea/dhcpv6/add_subnet"
      get: "/kea/dhcpv6/get_subnet"
      update: "/kea/dhcpv6/set_subnet"
      delete: "/kea/dhcpv6/del_subnet"
    attrs:
      - name: Subnet
        type: string
        key: subnet
      - name: Allocator
        type: SelectedMap
        key: allocator
      - name: PDAllocator
        type: SelectedMap
        key: pd-allocator
      - name: Pools
        type: string
        key: pools
      - name: Interface
        type: SelectedMap
        key: interface
      - name: OptionData
        type: OptionDataV6
        key: option_data
      - name: Description
        type: string
        key: description
    customTypes:
      OptionDataV6:
        - name: DomainNameServers
          type: SelectedMapList
          key: dns_servers
        - name: DomainSearch
          type: SelectedMapList
          key: domain_search
  - name: ReservationV6
    filename: reservationv6
    monad: reservation
    endpoints:
      add: "/kea/dhcpv6/add_reservation"
      get: "/kea/dhcpv6/get_reservation"
      update: "/kea/dhcpv6/set_reservation"
      delete: "/kea/dhcpv6/del_reservation"
    attrs:
      - name: Subnet
        type: SelectedMap
        key: subnet
      - name: IpAddress
        type: string
        key: ip_address
      - name: DUID
        type: string
        key: duid
      - name: Hostname
        type: string
        key: hostname
      - name: DomainSearch
        type: SelectedMapList
        key: domain_search
      - name: Description
        type: string
        key: description
  - name: PeerV6
    filename: peerv6
    monad: peer
    endpoints:
      add: "/kea/dhcpv6/add_peer"
      get: "/kea/dhcpv6/get_peer"
      update: "/kea/dhcpv6/set_peer"
      delete: "/kea/dhcpv6/del_peer"
    attrs:
      - name: Name
        type: string
        key: name
      - name: Url
        type: string
        key: url
      - name: Role
        type: SelectedMap
        key: role
  - name: PDPool
    filename: pd_pool
    monad: pd_pool
    endpoints:
      add: "/kea/dhcpv6/add_pd_pool"
      get: "/kea/dhcpv6/get_pd_pool"
      update: "/kea/dhcpv6/set_pd_pool"
      delete: "/kea/dhcpv6/del_pd_pool"
    attrs:
      - name: Subnet
        type: SelectedMap
        key: subnet
      - name: Prefix
        type: string
        key: prefix
      - name: PrefixLen
        type: string
        key: prefix_len
      - name: DelegatedLen
        type: string
        key: delegated_len
      - name: Description
        type: string
        key: description

rpc:
  - name: "Settings"
    filename: settings
    customTypes:
      DHCPv4Monad:
        - name: DHCPv4
          type: DHCPv4Settings
          key: dhcpv4
      DHCPv4Settings:
        - name: General
          type: DHCPv4General
          key: general
        - name: LeaseExpire
          type: LeaseExpire
          key: lexpire
        - name: HA
          type: HA
          key: ha
        - name: ThisHostname
          type: string
          key: this_hostname
      DHCPv4General:
        - name: Enabled
          type: string
          key: enabled
        - name: ManualConfig
          type: string
          key: manual_config
        - name: Interfaces
          type: SelectedMapList
          key: interfaces
        - name: ValidLifetime
          type: string
          key: valid_lifetime
        - name: FWRules
          type: string
          key: fwrules
        - name: DHCPSocketType
          type: SelectedMap
          key: dhcp_socket_type
      DHCPv6Monad:
        - name: DHCPv6
          type: DHCPv6Settings
          key: dhcpv6
      DHCPv6Settings:
        - name: General
          type: DHCPv6General
          key: general
        - name: LeaseExpire
          type: LeaseExpire
          key: lexpire
        - name: HA
          type: HA
          key: ha
        - name: ThisHostname
          type: string
          key: this_hostname
      DHCPv6General:
        - name: Enabled
          type: string
          key: enabled
        - name: ManualConfig
          type: string
          key: manual_config
        - name: Interfaces
          type: SelectedMapList
          key: interfaces
        - name: ValidLifetime
          type: string
          key: valid_lifetime
        - name: FWRules
          type: string
          key: fwrules
      LeaseExpire:
        - name: HoldReclaimedTime
          type: string
          key: hold_reclaimed_time
        - name: ReclaimTimerWaitTime
          type: string
          key: reclaim_timer_wait_time
        - name: FlushReclaimedTimerWaitTime
          type: string
          key: flush_reclaimed_timer_wait_time
        - name: MaxReclaimTime
          type: string
          key: max_reclaim_time
        - name: MaxReclaimLeases
          type: string
          key: max_reclaim_leases
        - name: UnwarnedReclaimCycles
          type: string
          key: unwarned_reclaim_cycles
      HA:
        - name: Enabled
          type: string
          key: enabled
        - name: ThisServerName
          type: string
          key: this_server_name
        - name: MaxUnackedClients
          type: string
          key: max_unacked_clients
      Result:
        - name: Result
          type: string
          key: result
      ActionResult:
        - name: Status
          type: string
          key: status
    rpc_calls:
      - name: "DHCPv4Get"
        method: "GET"
        endpoint: "/kea/dhcpv4/get"
        result_type: "DHCPv4Monad"
      - name: "DHCPv4Update"
        method: "POST"
        endpoint: "/kea/dhcpv4/set"
        params:
          - name: "dhcpv4"
            optional: false
            bodyParameter: true
            customType: "DHCPv4Settings"
        result_type: "Result"
      - name: "DHCPv6Get"
        method: "GET"
        endpoint: "/kea/dhcpv6/get"
        result_type: "DHCPv6Monad"
      - name: "DHCPv6Update"
        method: "POST"
        endpoint: "/kea/dhcpv6/set"
        params:
          - name: "dhcpv6"
            optional: false
            bodyParameter: true
            customType: "DHCPv6Settings"
        result_type: "Result"
      - name: "Reconfigure"
        method: "POST"
        endpoint: "/kea/service/reconfigure"
        result_type: "ActionResult"
