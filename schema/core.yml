---
name: core
rpc:
  - name: "System"
    filename: system
    customTypes: 
      SystemStatus:
        - name: CrashReporter
          type: Status
          key: CrashReporter   
        - name: Firewall
          type: Status
          key: Firewall   
        - name: System
          type: Status
          key: System   
      Status:
        - name: StatusCode
          type: int
          key: statusCode
        - name: Message
          type: string
          key: message
        - name: LogLocation
          type: string
          key: logLocation
        - name: Timestamp
          type: string
          key: timestamp
        - name: Status
          type: string
          key: status
    rpc_calls:
      - name: "Halt"
        method: "POST"
        endpoint: "/core/system/halt"
        result_type: "api.ActionResult"
      - name: "Reboot"
        method: "POST"
        endpoint: "/core/system/reboot"
        result_type: "api.ActionResult"
      - name: "Status"
        method: "GET"
        endpoint: "/core/system/status"
        result_type: "SystemStatus"
      - name: "DismissStatus"
        method: "POST"
        endpoint: "/core/system/dismiss_status"
        params:
          - name: "subject"
            optional: false
            bodyParameter: true
            type: string
        result_type: "api.ActionResult"  
  - name: "Service"
    filename: service
    customTypes:
      ServiceItem:
        - name: ID
          type: string
          key: id
        - name: Locked
          type: int
          key: locked
        - name: Running
          type: int
          key: running
        - name: Description
          type: string
          key: description
        - name: Name
          type: string
          key: name
      SearchServicesResponse:
        - name: Total
          type: int
          key: total
        - name: RowCount
          type: int
          key: rowCount
        - name: Current
          type: int
          key: current
        - name: Rows
          type: '[]ServiceItem'
          key: rows
      ServiceActionResult:
        - name: Result
          type: string
          key: result
    rpc_calls:
      - name: "Search"
        method: "POST"
        endpoint: "/core/service/search"
        result_type: "SearchServicesResponse"
      - name: "Start"
        method: "POST"
        endpoint: "/core/service/start"
        params:
          - name: "id"
            optional: false
            type: string
        result_type: "ServiceActionResult"
      - name: "Stop"
        method: "POST"
        endpoint: "/core/service/stop"
        params:
          - name: "id" # Path parameter
            optional: false
            type: string
        result_type: "ServiceActionResult"
      - name: "Restart"
        method: "POST"
        endpoint: "/core/service/restart"
        params:
          - name: "id"
            optional: false
            type: string
        result_type: "ServiceActionResult"
  - name: "Firmware"
    filename: firmware
    customTypes:
      FirmwarePackage:
        - name: Name
          type: string
          key: name
        - name: Version
          type: string
          key: version
        - name: Comment
          type: string
          key: comment
        - name: Flatsize
          type: string
          key: flatsize
        - name: Locked
          type: string
          key: locked
        - name: Automatic
          type: string
          key: automatic
        - name: License
          type: string
          key: license
        - name: Repository
          type: string
          key: repository
        - name: Origin
          type: string
          key: origin
        - name: Provided
          type: string
          key: provided
        - name: Installed
          type: string
          key: installed
        - name: Path
          type: string
          key: path
        - name: Configured
          type: string
          key: configured
      FirmwarePlugin:
        - name: Name
          type: string
          key: name
        - name: Version
          type: string
          key: version
        - name: Comment
          type: string
          key: comment
        - name: Flatsize
          type: string
          key: flatsize
        - name: Locked
          type: string
          key: locked
        - name: Automatic
          type: string
          key: automatic
        - name: License
          type: string
          key: license
        - name: Repository
          type: string
          key: repository
        - name: Origin
          type: string
          key: origin
        - name: Provided
          type: string
          key: provided
        - name: Installed
          type: string
          key: installed
        - name: Path
          type: string
          key: path
        - name: Configured
          type: string
          key: configured
        - name: Tier
          type: string
          key: tier
      FirmwareInfo:
        - name: ProductID
          type: string
          key: product_id
        - name: ProductVersion
          type: string
          key: product_version
        - name: Packages
          type: '[]FirmwarePackage'
          key: package
        - name: Plugins
          type: '[]FirmwarePlugin'
          key: plugin
      FirmwareActionResult:
        - name: Status
          type: string
          key: status
        - name: MsgUUID
          type: string
          key: msg_uuid
      FirmwareUpgradeStatus:
        - name: Status
          type: string
          key: status
        - name: Log
          type: string
          key: log
      FirmwareRunningStatus:
        - name: Status
          type: string
          key: status
    rpc_calls:
      - name: "Info"
        method: "GET"
        endpoint: "/core/firmware/info"
        result_type: "FirmwareInfo"
      - name: "Running"
        method: "GET"
        endpoint: "/core/firmware/running"
        result_type: "FirmwareRunningStatus"
      - name: "UpgradeStatus"
        method: "POST"
        endpoint: "/core/firmware/upgradestatus"
        result_type: "FirmwareUpgradeStatus"
      - name: "Install"
        method: "POST"
        endpoint: "/core/firmware/install"
        params:
          - name: "pkgName"
            optional: false
            type: string
        result_type: "FirmwareActionResult"
      - name: "Remove"
        method: "POST"
        endpoint: "/core/firmware/remove"
        params:
          - name: "pkgName"
            optional: false
            type: string
        result_type: "FirmwareActionResult"
      - name: "Reinstall"
        method: "POST"
        endpoint: "/core/firmware/reinstall"
        params:
          - name: "pkgName"
            optional: false
            type: string
        result_type: "FirmwareActionResult"
      - name: "Lock"
        method: "POST"
        endpoint: "/core/firmware/lock"
        params:
          - name: "pkgName"
            optional: false
            type: string
        result_type: "FirmwareActionResult"
      - name: "Unlock"
        method: "POST"
        endpoint: "/core/firmware/unlock"
        params:
          - name: "pkgName"
            optional: false
            type: string
        result_type: "FirmwareActionResult"
