      delete: "/quagga/bgp/delNeighbor"
    attrs:
      - name: Enabled
        type: string
        key: enabled
      - name: Description
        type: string
        key: description
      - name: PeerIP
        type: string
        key: address
      - name: RemoteASMode
        type: SelectedMap
        key: remote_as_mode
      - name: RemoteAS
        type: string
        key: remoteas
      - name: LocalAS
        type: string
        key: localas
      - name: Password
        type: string
        key: password
      - name: Weight
