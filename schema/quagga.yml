rpc:

  # General singleton (monad: general)
  - name: General
    filename: general
    customTypes:
      QuaggaGeneral:
        - name: Enabled
          type: string
          key: enabled
        - name: Profile
          type: SelectedMap
          key: profile
        - name: EnableCarp
          type: string
          key: enablecarp
        - name: EnableSyslog
          type: string
          key: enablesyslog
        - name: EnableSNMP
          type: string
          key: enablesnmp
        - name: SyslogLevel
          type: SelectedMap
          key: sysloglevel
        - name: FWRules
          type: string
          key: fwrules
      GeneralGetResult:
        - name: General
          type: QuaggaGeneral
          key: general
      GeneralSetResult:
        - name: Result
          type: string
          key: result
    rpc_calls:
      - name: Get
        method: GET
        endpoint: "/quagga/general/get"
        result_type: GeneralGetResult
      - name: Set
        method: POST
        endpoint: "/quagga/general/set"
        params:
          - name: general
            optional: false
            bodyParameter: true
            customType: QuaggaGeneral
        result_type: GeneralSetResult

  # BFD singleton (monad: bfd)
  - name: BFD
    filename: bfd
    customTypes:
      QuaggaBFD:
        - name: Enabled
          type: string
          key: enabled
      BFDGetResult:
        - name: BFD
          type: QuaggaBFD
          key: bfd
      BFDSetResult:
        - name: Result
          type: string
          key: result
    rpc_calls:
      - name: Get
        method: GET
        endpoint: "/quagga/bfd/get"
        result_type: BFDGetResult
      - name: Set
        method: POST
        endpoint: "/quagga/bfd/set"
        params:
          - name: bfd
            optional: false
            bodyParameter: true
            customType: QuaggaBFD
        result_type: BFDSetResult

  # BGP singleton (monad: bgp)
  - name: BGP
    filename: bgp
    customTypes:
      QuaggaBGP:
        - name: Enabled
          type: string
          key: enabled
        - name: ASNumber
          type: string
          key: asnumber
        - name: Distance
          type: string
          key: distance
        - name: RouterID
          type: string
          key: routerid
        - name: Graceful
          type: string
          key: graceful
        - name: NetworkImportCheck
          type: string
          key: networkimportcheck
        - name: EnforceFirstAS
          type: string
          key: enforce_first_as
        - name: LogNeighborChanges
          type: string
          key: logneighborchanges
        - name: Networks
          type: SelectedMapList
          key: networks
        - name: BestPath
          type: SelectedMapList
          key: bestpath
        - name: MaximumPaths
          type: string
          key: maximumpaths
        - name: MaximumPathsIBGP
          type: string
          key: maximumpathsibgp
      BGPGetResult:
        - name: BGP
          type: QuaggaBGP
          key: bgp
      BGPSetResult:
        - name: Result
          type: string
          key: result
    rpc_calls:
      - name: Get
        method: GET
        endpoint: "/quagga/bgp/get"
        result_type: BGPGetResult
      - name: Set
        method: POST
        endpoint: "/quagga/bgp/set"
        params:
          - name: bgp
            optional: false
            bodyParameter: true
            customType: QuaggaBGP
        result_type: BGPSetResult

  # OSPF singleton (URL space: /quagga/ospfsettings/; monad: ospf)
  - name: OSPF
    filename: ospf
    customTypes:
      QuaggaOSPF:
        - name: Enabled
          type: string
          key: enabled
        - name: CARPDemote
          type: string
          key: carp_demote
        - name: RouterID
          type: string
          key: routerid
        - name: CostReference
          type: string
          key: costreference
        - name: LogAdjacencyChanges
          type: string
          key: logadjacencychanges
        - name: Originate
          type: string
          key: originate
        - name: OriginateAlways
          type: string
          key: originatealways
        - name: OriginateMetric
          type: string
          key: originatemetric
        - name: PassiveInterfaces
          type: SelectedMapList
          key: passiveinterfaces
      OSPFGetResult:
        - name: OSPF
          type: QuaggaOSPF
          key: ospf
      OSPFSetResult:
        - name: Result
          type: string
          key: result
    rpc_calls:
      - name: Get
        method: GET
        endpoint: "/quagga/ospfsettings/get"
        result_type: OSPFGetResult
      - name: Set
        method: POST
        endpoint: "/quagga/ospfsettings/set"
        params:
