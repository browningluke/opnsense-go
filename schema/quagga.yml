          key: carp_demote
        - name: RouterID
          type: string
          key: routerid
        - name: Originate
          type: string
          key: originate
        - name: OriginateAlways
          type: string
          key: originatealways
        - name: OriginateMetric
          type: string
          key: originatemetric
      OSPF6GetResult:
        - name: OSPF6
          type: QuaggaOSPF6
          key: ospf6
      OSPF6SetResult:
        - name: Result
          type: string
          key: result
    rpc_calls:
      - name: Get
        method: GET
        endpoint: "/quagga/ospf6settings/get"
