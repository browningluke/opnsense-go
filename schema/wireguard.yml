---
name: wireguard
reconfigureEndpoint: "/wireguard/service/reconfigure" # Controller-wide reconfigure endpoint (can be overwritten)
resources:

  # wireguard-go resources

  - name: Server
    filename: server
    monad: server
    endpoints:
      add: "/wireguard/server/addServer"
      get: "/wireguard/server/getServer"
      update: "/wireguard/server/setServer"
      delete: "/wireguard/server/delServer"
    attrs:
      - name: Enabled
        type: string
        key: enabled
      - name: Name
        type: string
        key: name
      - name: Instance
        type: string
        key: instance
        omitEmpty: true
      - name: PublicKey
        type: string
        key: pubkey
      - name: PrivateKey
        type: string
        key: privkey
      - name: Port
        type: string
        key: port
      - name: MTU
        type: string
        key: mtu
      - name: DNS
        type: SelectedMapList
        key: dns
      - name: TunnelAddress
        type: SelectedMapList
        key: tunneladdress
      - name: DisableRoutes
        type: string
        key: disableroutes
      - name: Gateway
        type: string
        key: gateway
      - name: Peers
        type: SelectedMapList
        key: peers

  - name: Client
    filename: client
    monad: client
    endpoints:
      add: "/wireguard/client/addClient"
      get: "/wireguard/client/getClient"
      update: "/wireguard/client/setClient"
      delete: "/wireguard/client/delClient"
    attrs:
      - name: Enabled
        type: string
        key: enabled
      - name: Name
        type: string
        key: name
      - name: PublicKey
        type: string
        key: pubkey
      - name: PSK
        type: string
        key: psk
      - name: TunnelAddress
        type: SelectedMapList
        key: tunneladdress
      - name: ServerAddress
        type: string
        key: serveraddress
      - name: ServerPort
        type: string
        key: serverport
      - name: KeepAlive
        type: string
        key: keepalive

rpc:
  - name: General
    filename: general
    customTypes:
      GeneralGetResult:
        - name: General
          type: WireguardGeneral
          key: general
      WireguardGeneral:
        - name: Enabled
          type: string
          key: enabled
      GeneralSetResult:
        - name: Result
          type: string
          key: result
    rpc_calls:
      - name: Get
        method: GET
        endpoint: "/wireguard/general/get"
        result_type: GeneralGetResult
      - name: Set
        method: POST
        endpoint: "/wireguard/general/set"
        params:
          - name: general
            optional: false
            bodyParameter: true
            customType: WireguardGeneral
        result_type: GeneralSetResult

  - name: Service
    filename: gen
    customTypes:
      GenKeyPairResult:
        - name: PrivKey
          type: string
          key: privkey
        - name: PubKey
          type: string
          key: pubkey
        - name: Status
          type: string
          key: status
      GenPskResult:
        - name: Psk
          type: string
          key: psk
        - name: Status
          type: string
          key: status
    rpc_calls:
      - name: GenKeyPair
        method: GET
        # Note: path is camelCase (keyPair), NOT snake_case - do not change.
        endpoint: "/wireguard/server/keyPair"
        result_type: GenKeyPairResult
      - name: GenPsk
        method: GET
        endpoint: "/wireguard/client/psk"
        result_type: GenPskResult
